<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">

  <!-- DEFINITIONS -->
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e5fbf"/>
      <stop offset="50%" stop-color="#3fa9f5"/>
      <stop offset="100%" stop-color="#1e5fbf"/>
    </linearGradient>

    <!-- Glow effect -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Grid pattern -->
    <pattern id="grid" width="10" height="10" patternUnits="userSpaceOnUse">
      <path d="M 10 0 L 0 0 0 10" fill="none" stroke="white" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- MAIN PANEL -->
  <rect x="50" y="50" width="700" height="300" rx="12" ry="12"
        fill="url(#bgGradient)" />

  <!-- GRID OVERLAY -->
  <rect x="50" y="50" width="700" height="300" rx="12" ry="12"
        fill="url(#grid)" />

  <!-- GLOW BORDER -->
  <rect x="50" y="50" width="700" height="300" rx="12" ry="12"
        fill="none"
        stroke="#6ee7ff"
        stroke-width="3"
        filter="url(#glow)" />

</svg>