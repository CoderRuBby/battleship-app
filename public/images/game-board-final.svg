<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="1024" height="1536" viewBox="0 0 1024 1536" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="panelFill" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#2569D9"/>
      <stop offset="50%" stop-color="#4FC3FF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#2F7EF0"/>
      <animateTransform attributeName="gradientTransform"
        type="translate"
        values="0,0.22; 0,-0.22"
        dur="28s"
        repeatCount="indefinite"/>
    </linearGradient>

    <!-- softer, more transparent border -->
    <filter id="softBorder" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12">
        <animate attributeName="stdDeviation" values="10;12;10" dur="8s" repeatCount="indefinite"/>
      </feGaussianBlur>
    </filter>

    <!-- tracer blur -->
    <filter id="streakBlur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="0.9"/>
    </filter>

    <!-- more tracers, smoother and staggered -->
    <g id="freeTracers">
      <!-- 1 -->
      <g>
        <rect x="244" y="930" width="0.7" height="88" fill="#D8FFFF" opacity="0.34" filter="url(#streakBlur)">
          <animate attributeName="y" values="1010;345" dur="3.4s" begin="0.1s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0;0.34;0" dur="3.4s" begin="0.1s" repeatCount="indefinite"/>
        </rect>
        <rect x="244" y="930" width="0.7" height="6" fill="#FFFFFF" opacity="0">
          <animate attributeName="y" values="1010;345" dur="3.4s" begin="0.1s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0;0.95;0" dur="3.4s" begin="0.1s" repeatCount="indefinite"/>
        </rect>
      </g>

      <!-- 2 -->
      <g>
        <rect x="300" y="980" width="0.55" height="52" fill="#D8FFFF" opacity="0.28" filter="url(#streakBlur)">
          <animate attributeName="y" values="1080;310" dur="3.8s" begin="0.9s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0;0.28;0" dur="3.8s" begin="0.9s" repeatCount="indefinite"/>
        </rect>
        <rect x="300" y="980" width="0.55" height="5" fill="#FFFFFF" opacity="0">
          <animate attributeName="y" values="1080;310" dur="3.8s" begin="0.9s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0;0.85;0" dur="3.8s" begin="0.9s" repeatCount="indefinite"/>
        </rect>
      </g>

      <!-- 3 -->
      <g>
        <rect x="356" y="1010" width="0.6" height="64" fill="#D8FFFF" opacity="0.3" filter="url(#streakBlur)">
          <animate attributeName="y" values="1110;300" dur="3.1s" begin="1.5s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0;0.30;0" dur="3.1s" begin="1.5s" repeatCount="indefinite"/>
        </rect>
        <rect x="356" y="1010" width="0.6" height="5" fill="#FFFFFF" opacity="0">
          <animate attributeName="y" values="1110;300" dur="3.1s" begin="1.5s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0;0.9;0" dur="3.1s" begin="1.5s" repeatCount="indefinite"/>
        </rect>
      </g>

      <!-- 4 -->
      <g>
        <rect x="418" y="950" width="0.5" height="38" fill="#D8FFFF" opacity="0.26" filter="url(#streakBlur)">
          <animate attributeName="y" values="1050;280" dur="2.9s" begin="0.55s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0;0.26;0" dur="2.9s" begin="0.55s" repeatCount="indefinite"/>
        </rect>
        <rect x="418" y="950" width="0.5" height="4" fill="#FFFFFF" opacity="0">
          <animate attributeName="y" values="1050;280" dur="2.9s" begin="0.55s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0;0.84;0" dur="2.9s" begin="0.55s" repeatCount="indefinite"/>
        </rect>
      </g>

      <!-- 5 -->
      <g>
        <rect x="482" y="960" width="0.52" height="44" fill="#D8FFFF" opacity="0.29" filter="url(#streakBlur)">
          <animate attributeName="y" values="1060;285" dur="3.25s" begin="1.2s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0;0.29;0" dur="3.25s" begin="1.2s" repeatCount="indefinite"/>
        </rect>
        <rect x="482" y="960" width="0.52" height="4" fill="#FFFFFF" opacity="0">
          <animate attributeName="y" values="1060;285" dur="3.25s" begin="1.2s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0;0.88;0" dur="3.25s" begin="1.2s" repeatCount="indefinite"/>
        </rect>
      </g>

      <!-- 6 -->
      <g>
        <rect x="548" y="1005" width="0.62" height="70" fill="#D8FFFF" opacity="0.31" filter="url(#streakBlur)">
          <animate attributeName="y" values="1105;295" dur="3.7s" begin="0.35s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0;0.31;0" dur="3.7s" begin="0.35s" repeatCount="indefinite"/>
        </rect>
        <rect x="548" y="1005" width="0.62" height="5" fill="#FFFFFF" opacity="0">
          <animate attributeName="y" values="1105;295" dur="3.7s" begin="0.35s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0;0.92;0" dur="3.7s" begin="0.35s" repeatCount="indefinite"/>
        </rect>
      </g>

      <!-- 7 -->
      <g>
        <rect x="612" y="995" width="0.56" height="34" fill="#D8FFFF" opacity="0.25" filter="url(#streakBlur)">
          <animate attributeName="y" values="1095;320" dur="2.7s" begin="1.9s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0;0.25;0" dur="2.7s" begin="1.9s" repeatCount="indefinite"/>
        </rect>
        <rect x="612" y="995" width="0.56" height="4" fill="#FFFFFF" opacity="0">
          <animate attributeName="y" values="1095;320" dur="2.7s" begin="1.9s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0;0.82;0" dur="2.7s" begin="1.9s" repeatCount="indefinite"/>
        </rect>
      </g>

      <!-- 8 -->
      <g>
        <rect x="676" y="980" width="0.6" height="58" fill="#D8FFFF" opacity="0.30" filter="url(#streakBlur)">
          <animate attributeName="y" values="1080;305" dur="3.45s" begin="1.05s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0;0.30;0" dur="3.45s" begin="1.05s" repeatCount="indefinite"/>
        </rect>
        <rect x="676" y="980" width="0.6" height="5" fill="#FFFFFF" opacity="0">
          <animate attributeName="y" values="1080;305" dur="3.45s" begin="1.05s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0;0.9;0" dur="3.45s" begin="1.05s" repeatCount="indefinite"/>
        </rect>
      </g>

      <!-- 9 -->
      <g>
        <rect x="736" y="1000" width="0.54" height="30" fill="#D8FFFF" opacity="0.24" filter="url(#streakBlur)">
          <animate attributeName="y" values="1100;325" dur="2.5s" begin="1.65s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0;0.24;0" dur="2.5s" begin="1.65s" repeatCount="indefinite"/>
        </rect>
        <rect x="736" y="1000" width="0.54" height="4" fill="#FFFFFF" opacity="0">
          <animate attributeName="y" values="1100;325" dur="2.5s" begin="1.65s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0;0.8;0" dur="2.5s" begin="1.65s" repeatCount="indefinite"/>
        </rect>
      </g>

      <!-- 10 -->
      <g>
        <rect x="786" y="940" width="0.65" height="84" fill="#D8FFFF" opacity="0.33" filter="url(#streakBlur)">
          <animate attributeName="y" values="1020;350" dur="3.9s" begin="0.7s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0;0.33;0" dur="3.9s" begin="0.7s" repeatCount="indefinite"/>
        </rect>
        <rect x="786" y="940" width="0.65" height="6" fill="#FFFFFF" opacity="0">
          <animate attributeName="y" values="1020;350" dur="3.9s" begin="0.7s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0;0.96;0" dur="3.9s" begin="0.7s" repeatCount="indefinite"/>
        </rect>
      </g>
    </g>

    <pattern id="noise" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="2" height="2" fill="#DFFFFF" opacity="0.03"/>
      <rect x="4" y="4" width="2" height="2" fill="#FFFFFF" opacity="0.02"/>
      <animate attributeName="patternTransform"
        type="translate"
        values="0,0; 1,1; -1,1; 0,0"
        dur="1.2s"
        repeatCount="indefinite"/>
    </pattern>

    <pattern id="microGrid" width="12" height="12" patternUnits="userSpaceOnUse">
      <path d="M 12 0 L 0 0 0 12" fill="none" stroke="#BFE8FF" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
  </defs>

  <rect x="200" y="390" width="624" height="624" fill="url(#panelFill)"/>

  <use href="#freeTracers"/>

  <rect x="200" y="390" width="624" height="624" fill="url(#noise)"/>
  <rect x="200" y="390" width="624" height="624" fill="url(#microGrid)"/>

  <!-- softer, more transparent border, slight pulse -->
  <rect x="200" y="390" width="624" height="624"
        fill="none"
        stroke="#A8F5FF"
        stroke-width="2"
        opacity="0.22">
    <animate attributeName="opacity" values="0.18;0.24;0.18" dur="8s" repeatCount="indefinite"/>
  </rect>

  <rect x="200" y="390" width="624" height="624"
        fill="none"
        stroke="#7FDFFF"
        stroke-width="10"
        opacity="0.08"
        filter="url(#softBorder)">
    <animate attributeName="opacity" values="0.06;0.10;0.06" dur="8s" repeatCount="indefinite"/>
  </rect>
</svg>
